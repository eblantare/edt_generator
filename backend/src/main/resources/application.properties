# =====================================================
# CONFIGURATION GÉNÉRALE - DÉVELOPPEMENT LOCAL
# =====================================================

# ----- BASE DE DONNÉES -----
spring.datasource.url=jdbc:postgresql://localhost:5432/edt_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- JPA / HIBERNATE -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ----- SERVEUR -----
server.port=8080

# ----- CONFIGURATION UPLOAD -----
# Chemin de stockage des fichiers uploadés
upload.path=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ----- CONFIGURATION EMAIL GMAIL -----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=blantare.essoham@gmail.com
spring.mail.password=helcdkercrjnkevf
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=true

# ----- LOGGING DÉTAILLÉ -----
logging.level.com.edt=DEBUG
logging.level.com.edt.controllers=DEBUG
logging.level.com.edt.services=DEBUG
logging.level.com.edt.repository=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.stat=DEBUG
logging.level.org.postgresql=DEBUG

# Logs pour le mail (optionnel)
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail=DEBUG

# ----- JACKSON (FORMAT DES DATES) -----
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Europe/Paris
spring.jackson.serialization.write-dates-as-timestamps=false

# ----- CONFIGURATION DU POOL DE CONNEXIONS -----
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
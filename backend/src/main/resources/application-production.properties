# =====================================================
# CONFIGURATION PRODUCTION - À UTILISER SUR LE SERVEUR
# =====================================================

# ----- BASE DE DONNÉES (avec variables d'environnement) -----
# URL unique (format: postgresql://user:password@host:port/database)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Variables séparées (alternative plus lisible)
# spring.datasource.url=${JDBC_DATABASE_URL}
# spring.datasource.username=${JDBC_DATABASE_USERNAME}
# spring.datasource.password=${JDBC_DATABASE_PASSWORD}

# ----- JPA / HIBERNATE -----
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate  
spring.jpa.show-sql=false  
# Désactiver en production
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# ----- SERVEUR -----
# CORRIGÉ: Pas de commentaire sur la même ligne que la propriété
server.port=${PORT:8080}

# ----- EMAIL (CONFIGURATION POUR ENVOI RÉEL) -----
# Configuration SMTP (à adapter selon votre fournisseur)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ----- LOGGING MINIMAL (pour la production) -----
logging.level.com.edt=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN

# ----- GESTION DES ERREURS -----
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# ----- COMPRESSION GZIP (pour améliorer les performances) -----
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ----- CONFIGURATION SSL (si vous avez un certificat) -----

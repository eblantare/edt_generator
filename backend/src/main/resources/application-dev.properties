# Base de données de développement (peut être différente)
spring.datasource.url=jdbc:postgresql://localhost:5432/edt_db_dev
spring.datasource.username=postgres
spring.datasource.password=postgres

# Mode développement : création automatique à chaque démarrage
spring.jpa.hibernate.ddl-auto=create-drop

# Logs très détaillés
logging.level.com.edt=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE